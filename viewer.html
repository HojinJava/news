<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War News Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap');

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #08080c;
    --bg-surface: #0e0e14;
    --bg-card: #13131c;
    --bg-card-hover: #1a1a26;
    --bg-article: #0e0e16;
    --border: #1c1c2a;
    --border-accent: #2e2e44;
    --text: #e2e2ea;
    --text-dim: #7a7a90;
    --text-muted: #48485e;
    --accent: #6366f1;
    --accent-soft: rgba(99,102,241,0.12);
    --critical: #ef4444;
    --critical-bg: rgba(239,68,68,0.08);
    --critical-border: rgba(239,68,68,0.2);
    --major: #f59e0b;
    --major-bg: rgba(245,158,11,0.08);
    --major-border: rgba(245,158,11,0.2);
    --minor: #6b7280;
    --minor-bg: rgba(107,114,128,0.06);
    --minor-border: rgba(107,114,128,0.15);
    --verified: #10b981;
    --unverified: #f59e0b;
    --flagged: #ef4444;
    --col-width: 420px;
    --radius: 10px;
    --font: 'Noto Sans KR', sans-serif;
    --mono: 'JetBrains Mono', monospace;
  }

  html { scroll-behavior: smooth }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── Noise ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  /* ── Header ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8,8,12,0.88);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    padding: 16px 0;
  }

  .header-inner {
    max-width: 100%;
    margin: 0 auto;
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .header-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .header h1 {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .header .topic {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .header-stats {
    display: flex;
    gap: 18px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-dim);
  }

  .header-stats .num { color: var(--accent); font-weight: 500; }

  /* ── Loading / Error ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    gap: 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg) } }

  .error-msg {
    text-align: center;
    padding: 60px 32px;
    color: var(--critical);
    font-size: 14px;
  }

  /* ── Horizontal timeline track ── */
  .timeline-wrapper {
    position: relative;
    padding: 28px 0 0;
  }

  .timeline-track {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    gap: 0;
    padding: 0 32px 24px;
    scroll-snap-type: x proximity;
    scrollbar-width: thin;
    scrollbar-color: var(--border-accent) transparent;
  }

  .timeline-track::-webkit-scrollbar { height: 6px; }
  .timeline-track::-webkit-scrollbar-track { background: transparent; }
  .timeline-track::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }

  /* ── Horizontal line ── */
  .timeline-line {
    position: absolute;
    top: 54px;
    left: 32px;
    right: 32px;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), var(--border) 200px, var(--border));
    pointer-events: none;
    z-index: 1;
  }

  /* ── Day column ── */
  .day-column {
    flex: 0 0 var(--col-width);
    min-width: var(--col-width);
    scroll-snap-align: start;
    position: relative;
    padding: 0 10px;
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.35s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Day header (date marker) ── */
  .day-marker {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 10px;
    padding-bottom: 20px;
  }

  .day-dot {
    width: 11px; height: 11px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
    flex-shrink: 0;
    box-shadow: 0 0 0 3px var(--bg), 0 0 10px var(--accent-soft);
  }

  .day-label {
    font-size: 13px;
    font-family: var(--mono);
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.01em;
    white-space: nowrap;
  }

  .day-count {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-left: auto;
  }

  .day-market {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    padding: 2px 0 6px 36px;
  }

  .market-chip {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: 4px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-dim);
    white-space: nowrap;
  }

  .market-chip .mkt-name { color: var(--text-muted); margin-right: 3px; }
  .market-chip .mkt-up { color: var(--critical); }
  .market-chip .mkt-down { color: #3b82f6; }
  .market-chip .mkt-flat { color: var(--text-muted); }

  /* ── Events stack (vertical within day) ── */
  .events-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    padding-right: 4px;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-accent) transparent;
  }

  .events-stack::-webkit-scrollbar { width: 4px; }
  .events-stack::-webkit-scrollbar-track { background: transparent; }
  .events-stack::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 2px; }

  /* ── Event card ── */
  .event-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    overflow: hidden;
    min-height: 120px;
  }

  .event-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-accent);
    transform: translateY(-1px);
  }

  .event-card.expanded {
    border-color: var(--border-accent);
    background: var(--bg-card-hover);
  }

  .event-head {
    padding: 16px 18px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .event-time {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-bottom: 0;
  }

  .event-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .importance-badge {
    font-size: 10px;
    font-family: var(--mono);
    font-weight: 500;
    padding: 3px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .importance-critical {
    color: var(--critical);
    background: var(--critical-bg);
    border: 1px solid var(--critical-border);
  }

  .importance-major {
    color: var(--major);
    background: var(--major-bg);
    border: 1px solid var(--major-border);
  }

  .importance-minor {
    color: var(--minor);
    background: var(--minor-bg);
    border: 1px solid var(--minor-border);
  }

  .event-obj {
    margin-left: auto;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .obj-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .obj-dot.high { background: var(--verified); }
  .obj-dot.mid { background: var(--unverified); }
  .obj-dot.low { background: var(--flagged); }

  .chevron {
    color: var(--text-muted);
    font-size: 10px;
    transition: transform 0.2s ease;
    margin-left: 4px;
  }

  .event-card.expanded .chevron { transform: rotate(180deg); }

  .event-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.55;
    color: var(--text);
  }

  .event-summary {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .event-card.expanded .event-summary { -webkit-line-clamp: unset; }

  .event-footer {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 2px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  /* ── Articles panel ── */
  .articles-panel {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s ease;
  }

  .event-card.expanded .articles-panel {
    max-height: 3000px;
  }

  .articles-inner {
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .articles-divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 8px;
  }

  .article-card {
    background: var(--bg-article);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .article-card:hover { border-color: var(--border-accent); }

  .article-source-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .article-source {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .article-tag {
    font-size: 10px;
    font-family: var(--mono);
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.02em;
  }

  .tag-verified {
    color: var(--verified);
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.18);
  }

  .tag-unverified {
    color: var(--unverified);
    background: rgba(245,158,11,0.1);
    border: 1px solid rgba(245,158,11,0.18);
  }

  .tag-flagged {
    color: var(--flagged);
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.18);
  }

  .tag-bias {
    color: var(--text-dim);
    background: rgba(107,114,128,0.08);
    border: 1px solid rgba(107,114,128,0.15);
  }

  .tag-news {
    color: #60a5fa;
    background: rgba(96,165,250,0.1);
    border: 1px solid rgba(96,165,250,0.18);
  }

  .tag-sns {
    color: #a78bfa;
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.18);
  }

  .tag-video {
    color: #f472b6;
    background: rgba(244,114,182,0.1);
    border: 1px solid rgba(244,114,182,0.18);
  }

  .tag-community {
    color: #fb923c;
    background: rgba(251,146,60,0.1);
    border: 1px solid rgba(251,146,60,0.18);
  }

  .tag-think {
    color: #2dd4bf;
    background: rgba(45,212,191,0.1);
    border: 1px solid rgba(45,212,191,0.18);
  }

  .article-title-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }

  .article-summary-text {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .article-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    flex-wrap: wrap;
  }

  .article-scores {
    display: flex;
    gap: 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
  }

  .article-link {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.15s;
  }

  .article-link:hover { opacity: 1; text-decoration: underline; }

  .article-note {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    padding: 6px 8px;
    background: rgba(99,102,241,0.04);
    border-left: 2px solid var(--border-accent);
    border-radius: 0 4px 4px 0;
  }

  /* ── Nav hint ── */
  .nav-hint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    background: rgba(14,14,20,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 50;
    opacity: 1;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .nav-hint.hidden { opacity: 0; }

  /* ── Upload screen ── */
  .upload-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 32px;
    gap: 24px;
  }

  .upload-zone {
    width: 100%;
    max-width: 480px;
    border: 2px dashed var(--border-accent);
    border-radius: 16px;
    padding: 48px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    transition: all 0.25s ease;
    background: var(--bg-surface);
    position: relative;
  }

  .upload-zone:hover,
  .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(99,102,241,0.04);
    transform: translateY(-2px);
  }

  .upload-zone.dragover {
    box-shadow: 0 0 30px rgba(99,102,241,0.1);
  }

  .upload-icon {
    width: 56px; height: 56px;
    border-radius: 14px;
    background: var(--accent-soft);
    display: grid; place-items: center;
    font-size: 24px;
    color: var(--accent);
  }

  .upload-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .upload-desc {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.6;
  }

  .upload-btn {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    background: var(--accent-soft);
    border: 1px solid rgba(99,102,241,0.2);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .upload-btn:hover {
    background: rgba(99,102,241,0.18);
    border-color: var(--accent);
  }

  .upload-hint {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    text-align: center;
    max-width: 480px;
    line-height: 1.6;
  }

  .upload-file-input {
    display: none;
  }

  .upload-error {
    font-size: 12px;
    color: var(--critical);
    background: var(--critical-bg);
    border: 1px solid var(--critical-border);
    padding: 8px 14px;
    border-radius: 8px;
    max-width: 480px;
    text-align: center;
  }

  /* ── Original text toggle ── */
  .original-toggle {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent);
    opacity: 0.7;
    transition: opacity 0.15s;
    padding: 2px 0;
    user-select: none;
  }

  .original-toggle:hover { opacity: 1; }

  .toggle-icon {
    font-size: 10px;
    font-weight: 700;
    background: rgba(99,102,241,0.15);
    border: 1px solid rgba(99,102,241,0.25);
    padding: 1px 5px;
    border-radius: 3px;
    letter-spacing: 0.04em;
  }

  .original-text {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 8px;
    background: rgba(99,102,241,0.03);
    border-left: 2px solid rgba(99,102,241,0.15);
    border-radius: 0 6px 6px 0;
  }

  .original-text.show {
    max-height: 300px;
    padding: 8px;
  }

  .original-title {
    font-size: 11px;
    color: var(--text-dim);
    font-weight: 500;
    line-height: 1.5;
  }

  .original-summary {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 4px;
  }

  /* ── Modal overlay ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .modal {
    background: var(--bg-surface);
    border: 1px solid var(--border-accent);
    border-radius: 16px;
    width: 100%;
    max-width: 640px;
    max-height: calc(100vh - 48px);
    overflow-y: auto;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s ease;
    scrollbar-width: thin;
    scrollbar-color: var(--border-accent) transparent;
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal::-webkit-scrollbar { width: 5px; }
  .modal::-webkit-scrollbar-track { background: transparent; }
  .modal::-webkit-scrollbar-thumb { background: var(--border-accent); border-radius: 3px; }

  .modal-header {
    position: sticky;
    top: 0;
    z-index: 2;
    background: var(--bg-surface);
    padding: 20px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .modal-header-top {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal-close {
    margin-left: auto;
    width: 30px; height: 30px;
    display: grid; place-items: center;
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .modal-close:hover {
    border-color: var(--critical);
    color: var(--critical);
    background: var(--critical-bg);
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--text);
  }

  .modal-date {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
  }

  .modal-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .modal-summary {
    padding: 16px 24px;
    font-size: 14px;
    color: var(--text-dim);
    line-height: 1.7;
    border-bottom: 1px solid var(--border);
  }

  .modal-section-title {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 16px 24px 8px;
  }

  .modal-articles {
    padding: 0 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* modal article card */
  .m-article {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s;
  }

  .m-article:hover { border-color: var(--border-accent); }

  .m-article-source-row {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .m-article-source {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .m-article-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }

  .m-article-summary {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .m-article-original {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease;
    padding: 0 10px;
    background: rgba(99,102,241,0.03);
    border-left: 2px solid rgba(99,102,241,0.15);
    border-radius: 0 6px 6px 0;
  }

  .m-article-original.show {
    max-height: 300px;
    padding: 8px 10px;
  }

  .m-article-original-title {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
    line-height: 1.5;
  }

  .m-article-original-summary {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 4px;
  }

  .m-article-scores {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    flex-wrap: wrap;
  }

  .m-article-links {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 2px;
  }

  .m-source-link {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: var(--accent-soft);
    border: 1px solid rgba(99,102,241,0.18);

    transition: all 0.15s;
  }

  .m-source-link:hover {
    background: rgba(99,102,241,0.18);
    border-color: var(--accent);
  }

  .m-original-toggle {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent);
    opacity: 0.7;
    transition: opacity 0.15s;
    user-select: none;
    padding: 4px 8px;
    border: 1px solid rgba(99,102,241,0.15);
    border-radius: 6px;
  }

  .m-original-toggle:hover { opacity: 1; }

  .m-article-note {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    padding: 6px 8px;
    background: rgba(99,102,241,0.04);
    border-left: 2px solid var(--border-accent);
    border-radius: 0 4px 4px 0;
  }

  .m-article-framing {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    padding: 6px 8px;
    background: rgba(245,158,11,0.04);
    border-left: 2px solid rgba(245,158,11,0.2);
    border-radius: 0 4px 4px 0;
  }

  /* ── Source group in modal ── */
  .source-group {
    margin-bottom: 6px;
  }

  .source-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 0 6px;
  }

  .source-group-icon {
    font-size: 14px;
    width: 26px; height: 26px;
    border-radius: 6px;
    display: grid; place-items: center;
    flex-shrink: 0;
  }

  .sgi-news { background: rgba(96,165,250,0.12); color: #60a5fa; }
  .sgi-social { background: rgba(167,139,250,0.12); color: #a78bfa; }
  .sgi-think { background: rgba(45,212,191,0.12); color: #2dd4bf; }
  .sgi-video { background: rgba(244,114,182,0.12); color: #f472b6; }

  .source-group-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .source-group-count {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
  }

  /* Source item: "요약 [링크]" format */
  .source-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 6px;
    transition: border-color 0.15s;
  }

  .source-item:hover { border-color: var(--border-accent); }

  .source-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .source-item-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }

  .source-item-date {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
  }

  .source-item-body {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.65;
  }

  .source-item-body .src-link {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    text-decoration: none;
    margin-left: 4px;
    opacity: 0.85;
    transition: opacity 0.15s;
  }

  .source-item-body .src-link:hover { opacity: 1; text-decoration: underline; }

  .source-item-original {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease, margin 0.3s ease;
    margin-top: 0;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    padding: 0 8px;
    background: rgba(99,102,241,0.03);
    border-left: 2px solid rgba(99,102,241,0.12);
    border-radius: 0 4px 4px 0;
  }

  .source-item-original.show {
    max-height: 200px;
    padding: 6px 8px;
    margin-top: 8px;
  }

  .source-item-en-toggle {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--accent);
    opacity: 0.6;
    transition: opacity 0.15s;
    user-select: none;
    margin-left: 6px;
  }

  .source-item-en-toggle:hover { opacity: 1; }

  .source-item-scores {
    display: flex;
    gap: 10px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 6px;
  }

  .source-item-note {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    padding: 5px 8px;
    background: rgba(99,102,241,0.03);
    border-left: 2px solid var(--border);
    border-radius: 0 3px 3px 0;
    margin-top: 6px;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    :root { --col-width: 320px; }
    .header-inner { padding: 0 16px; gap: 10px; }
    .header h1 { font-size: 15px; }
    .header-stats { gap: 12px; font-size: 11px; }
    .timeline-track { padding: 0 12px 20px; }
    .timeline-line { left: 12px; right: 12px; }
    .day-column { padding: 0 6px; }
    .event-head { padding: 14px 14px 14px; }
    .event-title { font-size: 14px; }
    .modal { max-width: 100%; border-radius: 12px; }
    .modal-header { padding: 16px 16px 12px; }
    .modal-summary { padding: 12px 16px; font-size: 13px; }
    .modal-section-title { padding: 12px 16px 6px; }
    .modal-articles { padding: 0 16px 16px; }
  }

  @media (max-width: 400px) {
    :root { --col-width: calc(100vw - 32px); }
    .timeline-track { padding: 0 8px 16px; }
    .timeline-line { left: 8px; right: 8px; }
    .event-title { font-size: 14px; }
    .event-summary { font-size: 12px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="header-icon">&#9881;</div>
      <div>
        <h1 id="headerTitle">뉴스 타임라인</h1>
        <div class="topic" id="headerTopic"></div>
      </div>
    </div>
    <div class="header-stats" id="headerStats"></div>
  </div>
</header>

<main>
  <div id="content">
    <div class="loading">
      <div class="spinner"></div>
      <span>데이터 로딩 중...</span>
    </div>
  </div>
</main>

<div class="nav-hint" id="navHint">&#8592; &#8594; 좌우 스크롤로 날짜 이동</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script>
(function() {
  const BIAS_KO = {
    'left': '좌파', 'center-left': '중도좌파', 'center': '중도',
    'center-right': '중도우파', 'right': '우파'
  };
  const IMPORTANCE_KO = { 'critical': '긴급', 'major': '주요', 'minor': '일반' };
  const VERIFY_KO = { 'verified': '검증됨', 'unverified': '미검증', 'flagged': '의심' };

  function formatDate(iso) {
    try {
      const d = new Date(iso);
      const weekdays = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getMonth()+1}/${d.getDate()}(${weekdays[d.getDay()]})`;
    } catch { return iso; }
  }

  function formatYear(iso) {
    try { return new Date(iso).getFullYear() + ''; } catch { return ''; }
  }

  function formatDateShort(iso) {
    try {
      const d = new Date(iso);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    } catch { return ''; }
  }

  function dayKey(iso) {
    try {
      const d = new Date(iso);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    } catch { return 'unknown'; }
  }

  function detectSourceType(url, source) {
    const u = (url || '').toLowerCase();
    const s = (source || '').toLowerCase();
    if (u.includes('twitter.com') || u.includes('x.com')) return { label: 'SNS', cls: 'tag-sns' };
    if (u.includes('t.me') || s.includes('telegram')) return { label: 'SNS', cls: 'tag-sns' };
    if (u.includes('youtube.com') || u.includes('youtu.be')) return { label: '영상', cls: 'tag-video' };
    if (u.includes('reddit.com')) return { label: '커뮤니티', cls: 'tag-community' };
    if (s.includes('crisis group') || s.includes('cfr') || u.includes('crisisgroup.org') || u.includes('cfr.org')) return { label: '싱크탱크', cls: 'tag-think' };
    if (s.includes('associated press') || s.includes('reuters') || s.includes('bbc') || s.includes('al jazeera') || s.includes('war zone')) return { label: '뉴스', cls: 'tag-news' };
    if (u.includes('news.google.com') || u.includes('apnews.com') || u.includes('reuters.com') || u.includes('bbc.com') || u.includes('aljazeera.com') || u.includes('twz.com')) return { label: '뉴스', cls: 'tag-news' };
    return { label: '뉴스', cls: 'tag-news' };
  }

  function objLevel(score) {
    if (score >= 70) return 'high';
    if (score >= 45) return 'mid';
    return 'low';
  }

  function cleanText(t) {
    return (t || '').replace(/^\[번역 필요\]\s*/g, '').replace(/^종합:\s*/g, '');
  }

  // ── Market data cache ──
  let marketDataCache = {};
  let marketDataLoaded = false;

  async function fetchMarketData(dateKeys) {
    // Use free API: Yahoo Finance via unofficial proxy, or placeholder if unavailable
    // We'll try fetching from a lightweight API; if it fails, show placeholder
    const symbols = {
      oil: 'CL=F',       // WTI Crude Oil Futures
      nasdaq: '^IXIC',   // NASDAQ Composite
      btc: 'BTC-USD',    // Bitcoin
      kosdaq: '^KQ11',   // KOSDAQ
    };

    // Determine date range
    const sortedDates = [...dateKeys].sort();
    const from = sortedDates[0];
    const to = sortedDates[sortedDates.length - 1];

    // Try Yahoo Finance v8 chart API for each symbol
    for (const [key, symbol] of Object.entries(symbols)) {
      try {
        const fromTs = Math.floor(new Date(from).getTime() / 1000) - 86400;
        const toTs = Math.floor(new Date(to).getTime() / 1000) + 86400 * 2;
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?period1=${fromTs}&period2=${toTs}&interval=1d`;
        const resp = await fetch(url);
        if (!resp.ok) continue;
        const json = await resp.json();
        const result = json.chart?.result?.[0];
        if (!result) continue;
        const timestamps = result.timestamp || [];
        const closes = result.indicators?.quote?.[0]?.close || [];
        for (let i = 0; i < timestamps.length; i++) {
          const d = new Date(timestamps[i] * 1000);
          const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          if (!marketDataCache[dk]) marketDataCache[dk] = {};
          const close = closes[i];
          const prevClose = i > 0 ? closes[i-1] : null;
          if (close != null) {
            const pct = prevClose ? ((close - prevClose) / prevClose * 100) : null;
            marketDataCache[dk][key] = {
              close: key === 'btc' ? Math.round(close) : (close < 10 ? close.toFixed(2) : close.toFixed(1)),
              pct: pct != null ? (pct >= 0 ? `+${pct.toFixed(1)}%` : `${pct.toFixed(1)}%`) : null,
              dir: pct > 0.05 ? 'up' : (pct < -0.05 ? 'down' : 'flat'),
            };
          }
        }
      } catch {
        // silently skip
      }
    }
    marketDataLoaded = true;
    // Re-render market chips after data loads
    renderMarketChips();
  }

  function renderMarketChips() {
    document.querySelectorAll('.day-market[data-date]').forEach(el => {
      const dk = el.dataset.date;
      const d = marketDataCache[dk];
      if (!d) { el.innerHTML = ''; return; }
      const labels = { oil: '유가', nasdaq: '나스닥', btc: 'BTC', kosdaq: '코스닥' };
      let html = '';
      for (const [key, label] of Object.entries(labels)) {
        if (d[key]) {
          const { close, pct, dir } = d[key];
          html += `<span class="market-chip"><span class="mkt-name">${label}</span>${close} <span class="mkt-${dir}">${pct || ''}</span></span>`;
        }
      }
      el.innerHTML = html;
    });
  }

  function groupByDay(events) {
    const groups = new Map();
    for (const evt of events) {
      const key = dayKey(evt.date);
      if (!groups.has(key)) groups.set(key, []);
      groups.get(key).push(evt);
    }
    const sorted = [...groups.entries()].sort((a, b) => b[0].localeCompare(a[0]));
    for (const [, evts] of sorted) {
      evts.sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    return sorted;
  }

  // ── Store events for modal lookup ──
  let allEventsMap = {};

  // ── Modal ──
  const overlay = document.getElementById('modalOverlay');
  const modalEl = document.getElementById('modalContent');

  function closeModal() { overlay.classList.remove('open'); }

  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  const SOURCE_TYPE_META = {
    social:     { icon: '&#120143;', label: 'SNS / 트위터',   cls: 'sgi-social', order: 0 },
    news:       { icon: '&#9783;',   label: '뉴스 매체',      cls: 'sgi-news',   order: 1 },
    think_tank: { icon: '&#9670;',   label: '싱크탱크 / 리서치', cls: 'sgi-think',  order: 2 },
    video:      { icon: '&#9654;',   label: '영상',           cls: 'sgi-video',  order: 3 },
  };

  function getSourceType(art) {
    if (art.source_type && SOURCE_TYPE_META[art.source_type]) return art.source_type;
    const d = detectSourceType(art.url, art.source);
    if (d.cls === 'tag-sns') return 'social';
    if (d.cls === 'tag-think') return 'think_tank';
    if (d.cls === 'tag-video') return 'video';
    return 'news';
  }

  function formatTime(iso) {
    try {
      const d = new Date(iso);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    } catch { return ''; }
  }

  function formatTimeKST(iso) {
    try {
      const d = new Date(iso);
      // Convert to KST (UTC+9)
      const kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      return `${String(kst.getUTCHours()).padStart(2,'0')}:${String(kst.getUTCMinutes()).padStart(2,'0')}`;
    } catch { return ''; }
  }

  function openModal(eventId) {
    const evt = allEventsMap[eventId];
    if (!evt) return;
    const imp = evt.importance || 'minor';
    const lvl = objLevel(evt.objectivity_avg);
    const artCount = (evt.articles || []).length;

    // Group articles by source type
    const groups = {};
    (evt.articles || []).forEach((art, idx) => {
      const type = getSourceType(art);
      if (!groups[type]) groups[type] = [];
      groups[type].push({ art, idx });
    });

    // Sort groups: social first (Trump etc), then news, think tank, video
    const sortedTypes = Object.keys(groups).sort((a, b) =>
      (SOURCE_TYPE_META[a]?.order ?? 9) - (SOURCE_TYPE_META[b]?.order ?? 9)
    );

    let sourceSectionsHtml = '';
    for (const type of sortedTypes) {
      const meta = SOURCE_TYPE_META[type] || SOURCE_TYPE_META.news;
      const items = groups[type];

      const itemsHtml = items.map(({ art, idx }) => {
        const vStatus = art.verification_status || 'unverified';
        const biasText = BIAS_KO[art.source_bias] || art.source_bias || '중도';
        const summaryKo = cleanText(art.summary_ko || art.summary);
        const titleKo = cleanText(art.title_ko || art.title);
        const titleEn = art.title || '';
        const summaryEn = art.summary || '';
        const hasOriginal = titleEn && titleEn !== titleKo;
        const uid = eventId + '-' + idx;
        const note = art.bias_analysis_note || art.credibility_note || '';
        const displayText = summaryKo || titleKo;

        return `
          <div class="source-item">
            <div class="source-item-header">
              <span class="source-item-name">${art.source || 'Unknown'}</span>
              <span class="article-tag tag-${vStatus}">${VERIFY_KO[vStatus] || vStatus}</span>
              <span class="article-tag tag-bias">${biasText}</span>
              <span class="source-item-date">${formatTime(art.published_date)}</span>
            </div>
            <div class="source-item-body">
              ${displayText}
              ${art.url ? `<a class="src-link" href="${art.url}" target="_blank" rel="noopener">[출처]</a>` : ''}${art.view_count > 0 ? `<span style="font-size:9px;font-family:var(--mono);color:var(--text-muted);margin-left:4px">조회 ${art.view_count.toLocaleString()}</span>` : ''}
              ${hasOriginal ? `<span class="source-item-en-toggle" onclick="var p=document.getElementById('sorig-${uid}'); p.classList.toggle('show'); this.textContent=p.classList.contains('show')?'[EN 접기]':'[EN]';"><span>[EN]</span></span>` : ''}
            </div>
            ${hasOriginal ? `<div class="source-item-original" id="sorig-${uid}">${titleEn}${summaryEn ? ' — ' + summaryEn : ''}</div>` : ''}
            <div class="source-item-scores">
              <span>객관도 ${art.objectivity_score ?? '-'}</span>
              <span>신뢰도 ${art.source_reliability ?? '-'}</span>
              <span>편향 ${art.content_bias_score ?? '-'}</span>
            </div>
            ${note ? `<div class="source-item-note">${note}</div>` : ''}
          </div>`;
      }).join('');

      sourceSectionsHtml += `
        <div class="source-group">
          <div class="source-group-header">
            <span class="source-group-icon ${meta.cls}">${meta.icon}</span>
            <span class="source-group-label">${meta.label}</span>
            <span class="source-group-count">${items.length}건</span>
          </div>
          ${itemsHtml}
        </div>`;
    }

    modalEl.innerHTML = `
      <div class="modal-header">
        <div class="modal-header-top">
          <span class="importance-badge importance-${imp}">${IMPORTANCE_KO[imp] || imp}</span>
          <span class="modal-date">${formatDateShort(evt.date)}</span>
          <button class="modal-close" onclick="closeModal()">&#10005;</button>
        </div>
        <div class="modal-title">${cleanText(evt.title)}</div>
        <div class="modal-meta">
          <span>객관도 <span class="obj-dot ${lvl}" style="display:inline-block;vertical-align:middle"></span> ${evt.objectivity_avg ?? '-'}</span>
          <span>출처 ${artCount}건</span>
          ${evt.causally_related_to && evt.causally_related_to.length ? `<span>연관 사건 ${evt.causally_related_to.length}건</span>` : ''}
        </div>
      </div>
      <div class="modal-summary">${cleanText(evt.summary)}</div>
      <div class="modal-section-title">출처 (${artCount})</div>
      <div class="modal-articles">${sourceSectionsHtml}</div>`;

    modalEl.scrollTop = 0;
    overlay.classList.add('open');
  }

  function renderEvent(evt) {
    const imp = evt.importance || 'minor';
    const artCount = (evt.articles || []).length;
    const lvl = objLevel(evt.objectivity_avg);
    const eid = evt.event_id || '';

    // Collect unique source types for labels
    const typeSet = new Map();
    for (const a of (evt.articles || [])) {
      const t = detectSourceType(a.url, a.source);
      if (!typeSet.has(t.label)) typeSet.set(t.label, t);
    }
    const typeTags = [...typeSet.values()].map(t =>
      `<span class="article-tag ${t.cls}">${t.label}</span>`
    ).join('');

    const kstTime = formatTimeKST(evt.date);

    return `
      <div class="event-card" onclick="openModal('${eid}')">
        <div class="event-head">
          ${kstTime ? `<div class="event-time">${kstTime}</div>` : ''}
          <div class="event-top-row">
            <span class="importance-badge importance-${imp}">${IMPORTANCE_KO[imp] || imp}</span>
            <span class="event-obj">
              <span class="obj-dot ${lvl}"></span>
              ${evt.objectivity_avg ?? '-'}
            </span>
          </div>
          <div class="event-title">${cleanText(evt.title)}</div>
          <div class="event-summary">${cleanText(evt.summary)}</div>
          <div class="event-footer">
            ${typeTags}
            <span>기사 ${artCount}건</span>
          </div>
        </div>
      </div>`;
  }

  function render(data) {
    document.getElementById('headerTopic').textContent = data.topic || '';
    document.getElementById('headerStats').innerHTML = `
      <span>사건 <span class="num">${data.total_events ?? 0}</span></span>
      <span>기사 <span class="num">${data.total_articles ?? 0}</span></span>
      <span>${formatDateShort(data.date_range?.from)} ~ ${formatDateShort(data.date_range?.to)}</span>
    `;

    const events = data.events || [];
    if (!events.length) {
      document.getElementById('content').innerHTML = '<div class="error-msg">표시할 이벤트가 없습니다.</div>';
      return;
    }

    // Build lookup for modal
    allEventsMap = {};
    for (const evt of events) {
      if (evt.event_id) allEventsMap[evt.event_id] = evt;
    }

    const dayGroups = groupByDay(events);
    let prevYear = '';

    let html = '<div class="timeline-wrapper"><div class="timeline-line"></div><div class="timeline-track" id="timelineTrack">';

    dayGroups.forEach(([key, evts], i) => {
      const dateLabel = formatDate(evts[0].date);
      const year = formatYear(evts[0].date);
      const showYear = year !== prevYear;
      prevYear = year;

      html += `
        <div class="day-column" style="animation-delay:${Math.min(i * 0.04, 1)}s">
          <div class="day-marker">
            <div class="day-dot"></div>
            <div class="day-label">${showYear ? year + ' ' : ''}${dateLabel}</div>
            <div class="day-count">${evts.length}건</div>
          </div>
          <div class="day-market" data-date="${key}"></div>
          <div class="events-stack">
            ${evts.map(renderEvent).join('')}
          </div>
        </div>`;
    });

    html += '</div></div>';
    document.getElementById('content').innerHTML = html;

    // Scroll to rightmost (newest) — actually leftmost since sorted desc
    const track = document.getElementById('timelineTrack');

    // Hide nav hint after first scroll
    let hinted = false;
    track.addEventListener('scroll', () => {
      if (!hinted) {
        hinted = true;
        document.getElementById('navHint').classList.add('hidden');
      }
    }, { passive: true });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (document.querySelector('.modal-overlay.open')) return;
      if (e.key === 'ArrowRight') track.scrollBy({ left: 360, behavior: 'smooth' });
      if (e.key === 'ArrowLeft') track.scrollBy({ left: -360, behavior: 'smooth' });
    });

    // Fetch market data
    const dateKeys = dayGroups.map(([k]) => k);
    fetchMarketData(dateKeys);
  }

  // ── Upload UI ──
  function showUploadScreen(errorMsg) {
    document.getElementById('navHint').classList.add('hidden');
    document.getElementById('content').innerHTML = `
      <div class="upload-screen">
        <div class="upload-zone" id="uploadZone">
          <div class="upload-icon">&#8593;</div>
          <div class="upload-title">타임라인 JSON 파일 업로드</div>
          <div class="upload-desc">
            result.json 파일을 드래그하거나 클릭해서 선택하세요
          </div>
          <button class="upload-btn" id="uploadBtn">파일 선택</button>
          <input type="file" class="upload-file-input" id="uploadInput" accept=".json,application/json">
        </div>
        <div id="uploadError"></div>
        <div class="upload-hint">
          output/result.json 파일을 자동으로 불러오지 못했습니다.<br>
          파이프라인 실행 후 생성된 JSON 파일을 직접 업로드할 수 있습니다.
        </div>
      </div>`;

    const zone = document.getElementById('uploadZone');
    const input = document.getElementById('uploadInput');
    const btn = document.getElementById('uploadBtn');
    const errEl = document.getElementById('uploadError');

    btn.addEventListener('click', (e) => { e.stopPropagation(); input.click(); });
    zone.addEventListener('click', () => input.click());

    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file, errEl);
    });

    input.addEventListener('change', () => {
      if (input.files[0]) handleFile(input.files[0], errEl);
    });
  }

  function handleFile(file, errEl) {
    if (!file.name.endsWith('.json')) {
      errEl.innerHTML = '<div class="upload-error">JSON 파일만 업로드할 수 있습니다.</div>';
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.events || !Array.isArray(data.events)) {
          errEl.innerHTML = '<div class="upload-error">올바른 타임라인 JSON 형식이 아닙니다. (events 배열 필요)</div>';
          return;
        }
        document.getElementById('navHint').classList.remove('hidden');
        render(data);
      } catch (err) {
        errEl.innerHTML = `<div class="upload-error">JSON 파싱 실패: ${err.message}</div>`;
      }
    };
    reader.readAsText(file);
  }

  // ── Init: try fetch, fallback to upload ──
  fetch('output/result.json')
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      return r.json();
    })
    .then(data => {
      if (!data.events || !data.events.length) {
        showUploadScreen();
      } else {
        render(data);
      }
    })
    .catch(() => showUploadScreen());
})();
</script>
</body>
</html>
