sources:
  tier1_factual:
    - name: "Associated Press"
      search_keyword: "site:apnews.com"
      bias: "center"
      reliability: 95
      source_type: "news"
    - name: "Reuters"
      search_keyword: "site:reuters.com"
      bias: "center"
      reliability: 95
      source_type: "news"
    - name: "BBC News"
      search_keyword: "site:bbc.com/news"
      bias: "center-left"
      reliability: 90
      source_type: "news"

  tier2_analysis:
    - name: "Al Jazeera"
      search_keyword: "site:aljazeera.com"
      bias: "center-left"
      reliability: 80
      source_type: "news"
      note: "중동 이슈에서 카타르 자본 영향 가능"
    - name: "The War Zone"
      search_keyword: "site:twz.com"
      bias: "center-right"
      reliability: 85
      source_type: "news"
      note: "군사/무기 전문, 미국 시각 강함"

  tier3_tracker:
    - name: "International Crisis Group"
      search_keyword: "site:crisisgroup.org"
      bias: "center"
      reliability: 90
      source_type: "think_tank"
    - name: "CFR Global Conflict Tracker"
      search_keyword: "site:cfr.org"
      bias: "center"
      reliability: 90
      source_type: "think_tank"

  tier4_social:
    - name: "Trump (X/Twitter)"
      search_keyword: "from:realDonaldTrump"
      search_site: "site:x.com"
      bias: "right"
      reliability: 40
      source_type: "social"
      note: "미국 대통령 공식 계정, 정책 발언 1차 소스"
      required: true
    - name: "Elon Musk (X/Twitter)"
      search_keyword: "from:elonmusk"
      search_site: "site:x.com"
      bias: "right"
      reliability: 30
      source_type: "social"
      note: "X 플랫폼 소유자, 정치적 발언 빈번"
    - name: "X/Twitter 여론"
      search_keyword: ""
      search_site: "site:x.com"
      bias: "center"
      reliability: 25
      source_type: "social"
      note: "트위터 일반 여론, 인플루언서 포함"

collection:
  max_articles_per_source: 10
  date_range_days: 30
  languages: ["en"]
  output_language: "ko"

pipeline:
  debug_mode: false
  output_path: "output/result.json"
