<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스-시장 타임라인</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #12121a;
  --surface2: #1a1a26;
  --border: #2a2a3a;
  --text: #e8e8f0;
  --text-muted: #8888aa;
  --accent: #6b7cff;
  --critical: #ff4455;
  --major: #ff8c42;
  --minor: #6b7cff;
  --up: #44cc88;
  --down: #ff4455;
  --flat: #8888aa;
  --sidebar-w: 220px;
  --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  height: 100vh; overflow: hidden;
  display: flex; flex-direction: column; font-size: 14px;
}
/* header */
#header {
  height: var(--header-h); background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 14px; flex-shrink: 0; z-index: 100;
}
#cat-title { font-size: 15px; font-weight: 700; white-space: nowrap; }
#market-legend { display: flex; gap: 8px; flex-wrap: wrap; }
.legend-item {
  font-size: 11px; color: var(--text-muted);
  background: var(--surface2); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px;
}
.legend-key { color: var(--accent); font-weight: 700; }
/* layout */
#body-wrap { display: flex; flex: 1; overflow: hidden; }
/* sidebar */
#sidebar {
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border); overflow-y: auto;
  flex-shrink: 0; padding: 14px 0;
}
#sidebar-title {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: .08em; padding: 0 14px 8px;
}
.cat-btn {
  display: block; width: 100%; padding: 9px 14px;
  background: none; border: none; border-left: 3px solid transparent;
  color: var(--text-muted); font-size: 13px; text-align: left; cursor: pointer;
  transition: all .15s;
}
.cat-btn:hover { color: var(--text); background: var(--surface2); }
.cat-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(107,124,255,.08); }
.cat-date { display: block; font-size: 10px; color: var(--text-muted); margin-top: 2px; }
/* timeline */
#tl-wrap { flex: 1; overflow-x: auto; overflow-y: hidden; padding: 20px; }
#timeline {
  display: flex; gap: 0; height: 100%;
  min-width: max-content; position: relative;
}
#timeline::before {
  content: ''; position: absolute; left: 0; right: 0; top: 48px;
  height: 2px;
  background: linear-gradient(to right, transparent, var(--border) 40px, var(--border) calc(100% - 40px), transparent);
  pointer-events: none;
}
/* day column */
.day-col { width: 296px; min-width: 296px; display: flex; flex-direction: column; padding: 0 10px; flex-shrink: 0; }
.day-header { padding: 0 0 10px; position: relative; }
.day-dot {
  width: 10px; height: 10px; background: var(--accent); border-radius: 50%;
  border: 2px solid var(--bg); position: absolute; top: 4px; left: 50%; transform: translateX(-50%);
}
.day-label { font-size: 13px; font-weight: 700; text-align: center; padding-top: 20px; }
.day-market-row { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; margin-top: 5px; }
/* market chip */
.mkt-chip {
  font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border);
}
.mkt-chip.up   { color: var(--up);   border-color: rgba(68,204,136,.3); }
.mkt-chip.down { color: var(--down); border-color: rgba(255,68,85,.3); }
.mkt-chip.flat { color: var(--flat); }
/* events stack */
.day-events { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; flex: 1; padding-bottom: 8px; }
/* event card */
.evt-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  overflow: hidden; cursor: pointer; transition: border-color .15s, box-shadow .15s;
  min-height: 108px;
}
.evt-card:hover { border-color: var(--accent); box-shadow: 0 2px 10px rgba(107,124,255,.15); }
.evt-card.open  { border-color: var(--accent); }
.evt-head { padding: 12px 14px 8px; display: flex; flex-direction: column; gap: 6px; }
.evt-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.evt-time { font-size: 11px; color: var(--text-muted); }
.src-tag {
  font-size: 10px; padding: 1px 5px; border-radius: 3px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
}
.imp { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: .04em; }
.imp.critical { background: rgba(255,68,85,.15); color: var(--critical); border: 1px solid rgba(255,68,85,.3); }
.imp.major    { background: rgba(255,140,66,.15); color: var(--major);    border: 1px solid rgba(255,140,66,.3); }
.imp.minor    { background: rgba(107,124,255,.10); color: var(--minor);  border: 1px solid rgba(107,124,255,.3); }
.evt-title { font-size: 13px; font-weight: 600; line-height: 1.4; }
.evt-summary {
  font-size: 12px; color: var(--text-muted); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.evt-chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 0 14px 10px; }
/* detail */
.evt-detail { display: none; border-top: 1px solid var(--border); }
.evt-card.open .evt-detail { display: block; }
.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 7px; background: none; border: none; cursor: pointer;
  font-size: 11px; color: var(--text-muted); border-bottom: 2px solid transparent; transition: all .15s;
}
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }
.pane { display: none; padding: 12px 14px; }
.pane.on { display: block; }
/* source list */
.src-list { display: flex; flex-direction: column; gap: 8px; }
.src-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; }
.src-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.src-name { font-size: 11px; font-weight: 600; color: var(--accent); }
.src-meta { font-size: 10px; color: var(--text-muted); }
.src-title { font-size: 12px; font-weight: 600; margin-bottom: 4px; }
.src-summary { font-size: 11px; color: var(--text-muted); line-height: 1.5; margin-bottom: 6px; }
.src-foot { display: flex; justify-content: space-between; align-items: center; gap: 4px; }
.src-views { font-size: 10px; color: var(--text-muted); }
.src-link {
  font-size: 10px; color: var(--accent); text-decoration: none;
  border: 1px solid rgba(107,124,255,.3); padding: 2px 7px; border-radius: 3px;
}
.src-link:hover { background: rgba(107,124,255,.1); }
/* svg chart */
.chart-wrap { width: 100%; }
.chart-wrap svg { width: 100%; height: 140px; display: block; }
/* misc */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--text-muted); z-index: 200;
}
.empty { padding: 32px; color: var(--text-muted); font-size: 13px; }
@media (max-width: 768px) {
  #sidebar { display: none; }
  .day-col { width: calc(100vw - 40px); min-width: calc(100vw - 40px); }
}
</style>
</head>
<body>

<div id="loading">데이터 로딩 중…</div>

<div id="header">
  <h1 id="cat-title">뉴스-시장 타임라인</h1>
  <div id="market-legend"></div>
</div>

<div id="body-wrap">
  <nav id="sidebar">
    <div id="sidebar-title">카테고리</div>
    <div id="cat-list"></div>
  </nav>
  <div id="tl-wrap">
    <div id="timeline"></div>
  </div>
</div>

<script>
'use strict';
let CFG = null, NEWS = null, MKT = null, SLUG = null;

/* utils */
const fdelta = p => {
  if (p == null) return null;
  return (p > 0 ? '+' : '') + p.toFixed(2) + '%';
};
const dcls = p => (!p || Math.abs(p) < 0.05) ? 'flat' : p > 0 ? 'up' : 'down';
const fviews = n => {
  if (!n || n < 0) return '';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M 뷰';
  if (n >= 1e3) return (n/1e3).toFixed(0) + 'K 뷰';
  return n + ' 뷰';
};
const fdate = s => {
  const d = new Date(s + 'T00:00:00Z');
  return d.toLocaleDateString('ko-KR', { month:'long', day:'numeric', weekday:'short', timeZone:'UTC' });
};
const ftime = s => {
  if (!s) return '';
  return new Date(s).toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit', timeZone:'Asia/Seoul' });
};
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
const safeUrl = u => (u && (u.startsWith('https://') || u.startsWith('http://'))) ? u : '#';

/* data loading */
async function jfetch(p) {
  const r = await fetch(p);
  if (!r.ok) throw new Error(p + ' ' + r.status);
  return r.json();
}

async function loadCat(slug) {
  SLUG = slug;
  document.getElementById('loading').style.display = 'flex';
  try {
    [CFG, NEWS] = await Promise.all([
      jfetch(`data/${slug}/config.json`),
      jfetch(`data/${slug}/news.json`),
    ]);
    try { MKT = await jfetch(`data/${slug}/market.json`); } catch { MKT = null; }
    renderHeader(); renderTimeline(); updateActive(slug);
  } catch(e) {
    document.getElementById('timeline').innerHTML = `<div class="empty">오류: ${esc(e.message)}</div>`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

async function init() {
  let reg;
  try { reg = await jfetch('data/registry.json'); }
  catch { reg = { categories: [{ slug:'iran-war', name:'이란-이스라엘 전쟁', last_updated:'' }] }; }
  renderSidebar(reg.categories);
  if (reg.categories.length) await loadCat(reg.categories[0].slug);
}

/* render */
function renderHeader() {
  document.getElementById('cat-title').textContent = CFG.name || '타임라인';
  document.getElementById('market-legend').innerHTML =
    (CFG.markets || []).map(m =>
      `<span class="legend-item"><span class="legend-key">${esc(m.key)}</span> ${esc(m.label)}</span>`
    ).join('');
}

function renderSidebar(cats) {
  document.getElementById('cat-list').innerHTML = cats.map(c =>
    `<button class="cat-btn" data-slug="${esc(c.slug)}" onclick="loadCat('${esc(c.slug)}')">${esc(c.name)}<span class="cat-date">${c.last_updated ? c.last_updated.slice(0,10) : ''}</span></button>`
  ).join('');
}

function updateActive(slug) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.slug === slug));
}

function dailyMkt(date) {
  if (!MKT || !CFG) return [];
  return (CFG.markets || []).flatMap(m => {
    const td = MKT.tickers?.[m.ticker];
    const day = td?.daily?.find(d => d.date === date);
    if (!day) return [];
    const prev = td.daily.filter(d => d.date < date).slice(-1)[0];
    const base = prev?.close || day.open;
    const delta = base ? (day.close - base) / base * 100 : 0;
    return [{ key: m.key, delta }];
  });
}

function evtMkt(evt) {
  if (!evt.market_impact || !CFG) return [];
  return (CFG.markets || []).flatMap(m => {
    const mi = evt.market_impact[m.key];
    return mi ? [{ key: m.key, delta: mi.delta_pct }] : [];
  });
}

function chips(items) {
  return items.map(i => {
    const d = fdelta(i.delta);
    return `<span class="mkt-chip ${dcls(i.delta)}">${esc(i.key)} ${d || '—'}</span>`;
  }).join('');
}

function renderTimeline() {
  const tl = document.getElementById('timeline');
  if (!NEWS?.events?.length) { tl.innerHTML = '<div class="empty">이벤트 없음</div>'; return; }

  const byDate = {};
  for (const e of NEWS.events) { const d = e.date.slice(0,10); (byDate[d] = byDate[d]||[]).push(e); }
  const dates = Object.keys(byDate).sort();

  tl.innerHTML = dates.map(date => {
    const evts = byDate[date];
    return `<div class="day-col">
      <div class="day-header">
        <div class="day-dot"></div>
        <div class="day-label">${fdate(date)}</div>
        <div class="day-market-row">${chips(dailyMkt(date))}</div>
      </div>
      <div class="day-events">${evts.map(e => evtCard(e)).join('')}</div>
    </div>`;
  }).join('');
}

function evtCard(evt) {
  const id = esc(evt.event_id);
  const srcs = [...new Set((evt.articles||[]).map(a=>a.source))].slice(0,3);
  const t0 = evt.articles?.[0]?.published_date;
  const mktChips = chips(evtMkt(evt));

  return `<div class="evt-card" id="evc-${id}" onclick="toggleCard('${id}')">
    <div class="evt-head">
      <div class="evt-meta">
        ${t0 ? `<span class="evt-time">${ftime(t0)}</span>` : ''}
        ${srcs.map(s=>`<span class="src-tag">${esc(s)}</span>`).join('')}
        <span class="imp ${esc(evt.importance)}">${esc(evt.importance)}</span>
      </div>
      <div class="evt-title">${esc(evt.title)}</div>
      <div class="evt-summary">${esc(evt.summary)}</div>
    </div>
    ${mktChips ? `<div class="evt-chips">${mktChips}</div>` : ''}
    <div class="evt-detail">
      <div class="tabs">
        <button class="tab on" onclick="swTab(event,'${id}','src')">출처 목록</button>
        <button class="tab"    onclick="swTab(event,'${id}','cht')">차트</button>
      </div>
      <div class="pane on" id="pane-src-${id}">${srcList(evt.articles||[])}</div>
      <div class="pane"    id="pane-cht-${id}">${chartPane(evt)}</div>
    </div>
  </div>`;
}

function srcList(articles) {
  if (!articles.length) return '<p class="empty" style="padding:8px 0">기사 없음</p>';
  return `<div class="src-list">${articles.map(a => `
    <div class="src-card">
      <div class="src-top">
        <span class="src-name">${esc(a.source)}</span>
        <span class="src-meta">${ftime(a.published_date)} · ${a.verification_status==='verified'?'✓ 검증':esc(a.verification_status||'')}</span>
      </div>
      <div class="src-title">${esc(a.title_ko||a.title)}</div>
      <div class="src-summary">${esc(a.summary_ko||a.summary||'')}</div>
      <div class="src-foot">
        <span class="src-views">${fviews(a.view_count)}</span>
        <a class="src-link" href="${safeUrl(a.url)}" target="_blank" rel="noopener">원문 →</a>
      </div>
    </div>`).join('')}</div>`;
}

function chartPane(evt) {
  if (!MKT || !CFG?.markets?.length) return '<p class="empty" style="padding:8px 0">시장 데이터 없음</p>';
  const m = CFG.markets[0];
  const td = MKT.tickers?.[m.ticker];
  if (!td?.daily?.length) return `<p class="empty" style="padding:8px 0">${esc(m.key)} 데이터 없음</p>`;
  const date = evt.date.slice(0,10);
  const idx = td.daily.findIndex(d => d.date === date);
  const sl = idx > 0 ? td.daily.slice(Math.max(0,idx-1), idx+1) : td.daily.slice(0,2);
  if (!sl.length) return '<p class="empty" style="padding:8px 0">당일 데이터 없음</p>';
  return `<div class="chart-wrap">${svgChart(sl, m.label)}</div>`;
}

function svgChart(bars, label) {
  const W=270, H=120, PT=14, PR=6, PB=22, PL=44;
  const cw = W-PL-PR, ch = H-PT-PB;
  const prices = bars.flatMap(b=>[b.open,b.high,b.low,b.close]);
  const mn = Math.min(...prices), mx = Math.max(...prices), rng = mx-mn||1;
  const xs = i => PL + i * (cw / Math.max(bars.length-1,1));
  const ys = v => PT + ch - ((v-mn)/rng)*ch;
  const pts = bars.map((b,i)=>`${xs(i)},${ys(b.close)}`).join(' ');
  const color = bars[bars.length-1].close >= bars[0].close ? '#44cc88' : '#ff4455';
  const fp = v => v>=1000 ? v.toFixed(0) : v.toFixed(2);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:var(--surface2);border-radius:6px">
    <text x="3" y="${PT+8}" font-size="9" fill="#8888aa">${esc(label)}</text>
    <text x="3" y="${PT+ch/2+4}" font-size="8" fill="#8888aa">${fp((mn+mx)/2)}</text>
    <text x="3" y="${PT+ch}" font-size="8" fill="#8888aa">${fp(mn)}</text>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
    ${bars.map((b,i)=>`<text x="${xs(i)}" y="${H-5}" font-size="8" fill="#8888aa" text-anchor="middle">${esc(b.date.slice(5))}</text>`).join('')}
  </svg>`;
}

/* interactions */
function toggleCard(id) {
  document.getElementById('evc-' + id).classList.toggle('open');
}
function swTab(e, id, tab) {
  e.stopPropagation();
  const card = document.getElementById('evc-' + id);
  card.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
  card.querySelectorAll('.pane').forEach(p => p.classList.remove('on'));
  e.target.classList.add('on');
  document.getElementById('pane-' + tab + '-' + id).classList.add('on');
}

init();
</script>
</body>
</html>
